version: "3.8"

services:
  discord-bot:
    build: .
    container_name: discord-ai-bot
    restart: unless-stopped
    command: ["python", "-u", "discord_bot.py"]
    environment:
      - TZ=Asia/Taipei
      - BOT_DB_PATH=/app/data/bot.db
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUMMARY_CHANNEL_ID=${SUMMARY_CHANNEL_ID}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DB_ID=${NOTION_DB_ID}
      - GCAL_ICAL_URL=${GCAL_ICAL_URL}
      - WEATHER_CITY=${WEATHER_CITY}
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  line-bot:
    build: .
    container_name: line-ai-bot
    restart: unless-stopped
    command: ["python", "-u", "line_bot.py"]
    environment:
      - TZ=Asia/Taipei
      - BOT_DB_PATH=/app/data/bot.db
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WEATHER_CITY=${WEATHER_CITY}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - INVENTORY_NOTION_DB_ID=${INVENTORY_NOTION_DB_ID}
      - INVENTORY_NAME_PROP=${INVENTORY_NAME_PROP:-е“Ғй …еҗҚзЁұ}
      - INVENTORY_STOCK_PROP=${INVENTORY_STOCK_PROP:-еә«еӯҳ}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Cloudflare TunnelпјҡжҠҠ line-bot:8080 жҡҙйңІжҲҗ HTTPSпјҢзөҰ Line webhook з”Ё
  # иЁӯе®ҡж–№ејҸпјҡCloudflare Zero Trust вҶ’ Tunnels вҶ’ Create вҶ’ иӨҮиЈҪ token еҲ° .env
  # Public hostname жҢҮеҗ‘ http://line-bot:8080
  # иӢҘжІ’еЎ« tokenпјҢйҖҷеҖӢ service дёҚжңғе•ҹеӢ•пјҲз”Ё profile gatingпјү
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - line-bot
    profiles:
      - tunnel
